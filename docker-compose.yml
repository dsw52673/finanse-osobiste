services:
    db:
        image: postgres:16-alpine
        restart: always
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: finanse_osobiste
        volumes:
            - db_data:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U postgres" ]
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        build: ./backend
        restart: always
        ports:
            - "3001:3001"
        env_file:
            - ./backend/.env
        environment:
            DATABASE_URL: postgresql://postgres:postgres@db:5432/finanse_osobiste
            NODE_ENV: production
        depends_on:
            db:
                condition: service_healthy
        command: >
            sh -c "npx prisma migrate deploy && node dist/index.js"

    frontend:
        build: ./frontend
        restart: always
        ports:
            - "3000:3000"
        environment:
            NODE_ENV: production
        depends_on:
            - backend

volumes:
    db_data:
